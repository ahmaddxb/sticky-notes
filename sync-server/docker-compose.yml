services:
  sync-server:
    image: ghcr.io/ahmaddxb/sticky-notes-sync-server:latest
    container_name: sticky-notes-sync
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATA_FILE=/app/data/server-notes.json
      - USER_FILE=/app/data/users.json
      - SYNC_KEY=your_secret_key_here
      - SESSION_SECRET=your_session_secret_here
    volumes:
      - ./data:/app/data
      - ./updates:/app/updates
    restart: unless-stopped
